<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 شاشة العرض</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg-deep: #0a0a0f;
    --bg-card: #14141c;
    --gold: #d4af37;
    --gold-light: #f4e5b0;
    --gold-dark: #a58020;
    --gold-glow: rgba(212, 175, 55, 0.3);
    --text-primary: #f7e7ce;
    --text-secondary: #b8a888;
    --text-muted: #7a6f56;
    --border-gold: rgba(212, 175, 55, 0.2);
    --border-gold-strong: rgba(212, 175, 55, 0.4);
    --danger: #ef4444;
    --success: #4ade80;
    --instagram: #e1306c;
    --tiktok: #25f4ee;
    --snapchat: #fffc00;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', 'Segoe UI', sans-serif; }

body {
    min-height: 100vh;
    background: var(--bg-deep);
    background-image:
        radial-gradient(circle at 20% 20%, rgba(212, 175, 55, 0.15) 0px, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.1) 0px, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(180, 130, 40, 0.08) 0px, transparent 60%);
    color: var(--text-primary);
    overflow-x: hidden;
    padding: 30px 20px;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 55, 0.03) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmerBg 10s infinite;
    pointer-events: none;
    z-index: 0;
}

@keyframes shimmerBg {
    0%, 100% { background-position: -200% 0; }
    50% { background-position: 200% 0; }
}

.display-container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

/* ============== HEADER ============== */
.display-header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeInDown 1s;
    padding: 28px;
    background: linear-gradient(135deg, rgba(20, 20, 28, 0.7), rgba(30, 25, 15, 0.6));
    border: 1px solid var(--border-gold);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
}

.display-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.display-logo {
    width: 90px;
    height: 90px;
    margin: 0 auto 16px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    overflow: hidden;
    border: 3px solid var(--gold);
    box-shadow: 0 8px 32px var(--gold-glow);
    color: var(--bg-deep);
}

.display-logo img { width: 100%; height: 100%; object-fit: cover; }

.display-title {
    font-family: 'Playfair Display', 'Tajawal', serif;
    font-size: clamp(32px, 6vw, 60px);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    margin-bottom: 10px;
    animation: gradient-shift 5s ease infinite;
    letter-spacing: 1px;
}

@keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.display-subtitle {
    font-size: clamp(13px, 2vw, 18px);
    color: rgba(247, 231, 206, 0.7);
    letter-spacing: 2px;
}

.live-indicator {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 7px 20px;
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid rgba(74, 222, 128, 0.4);
    border-radius: 20px;
    font-size: 12px;
    color: var(--success);
    margin-top: 16px;
}

.live-dot {
    width: 9px; height: 9px;
    background: var(--success);
    border-radius: 50%;
    animation: livePulse 1.5s infinite;
    box-shadow: 0 0 12px var(--success);
}

@keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
}

/* ============== VIEW TOGGLE ============== */
.view-toggle {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.view-btn {
    padding: 13px 32px;
    background: rgba(20, 20, 28, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border-gold);
    border-radius: 14px;
    color: rgba(247, 231, 206, 0.6);
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.3s;
}

.view-btn:hover { background: rgba(212, 175, 55, 0.08); color: var(--gold-light); }

.view-btn.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    border-color: transparent;
    box-shadow: 0 8px 24px var(--gold-glow);
}

/* ============== STATS ============== */
.stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 30px;
}

@media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

.stat-box {
    padding: 20px;
    background: linear-gradient(135deg, rgba(20, 20, 28, 0.7), rgba(30, 25, 15, 0.5));
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-gold);
    border-radius: 18px;
    text-align: center;
    transition: all 0.3s;
}

.stat-box:hover {
    transform: translateY(-3px);
    border-color: var(--border-gold-strong);
    box-shadow: 0 8px 24px rgba(212, 175, 55, 0.1);
}

.stat-box-label {
    font-size: 12px;
    color: rgba(247, 231, 206, 0.5);
    margin-bottom: 6px;
    letter-spacing: 1px;
}

.stat-box-value {
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ============== WINNER SPOTLIGHT ============== */
.winner-spotlight {
    text-align: center;
    padding: 35px;
    margin-bottom: 30px;
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.18), rgba(20, 20, 28, 0.6));
    border: 2px solid var(--gold);
    border-radius: 24px;
    animation: zoomIn 1s;
    box-shadow: 0 12px 48px var(--gold-glow);
    position: relative;
    overflow: hidden;
}

.winner-spotlight::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.08), transparent);
    animation: rotateShine 8s linear infinite;
}

@keyframes rotateShine { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.crown-big { font-size: 76px; margin-bottom: 12px; animation: crownBounce 2s infinite; position: relative; }
@keyframes crownBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

.crown-label {
    font-size: 14px;
    color: rgba(247, 231, 206, 0.7);
    margin-bottom: 10px;
    letter-spacing: 3px;
    position: relative;
}

.crown-name {
    font-size: clamp(28px, 5vw, 50px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    position: relative;
}

.crown-sub { font-size: 16px; color: rgba(247, 231, 206, 0.7); position: relative; }

/* ============== LEADERBOARD ============== */
.leaderboard { display: flex; flex-direction: column; gap: 12px; }

.lb-row {
    display: grid;
    grid-template-columns: 70px 64px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 18px 22px;
    background: linear-gradient(135deg, rgba(20, 20, 28, 0.7), rgba(20, 20, 28, 0.4));
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-gold);
    border-radius: 18px;
    animation: slideInRight 0.6s ease-out backwards;
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.lb-row:hover {
    transform: scale(1.01);
    border-color: var(--border-gold-strong);
    box-shadow: 0 8px 24px rgba(212, 175, 55, 0.12);
}

.lb-row.rank-1 {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.22), rgba(20, 20, 15, 0.5));
    border-color: var(--gold);
    box-shadow: 0 12px 40px var(--gold-glow);
    transform: scale(1.02);
}

.lb-row.rank-2 {
    background: linear-gradient(135deg, rgba(203, 213, 225, 0.12), rgba(20, 20, 28, 0.5));
    border-color: rgba(203, 213, 225, 0.4);
}

.lb-row.rank-3 {
    background: linear-gradient(135deg, rgba(217, 119, 6, 0.15), rgba(20, 20, 28, 0.5));
    border-color: rgba(217, 119, 6, 0.4);
}

.lb-rank-badge {
    width: 56px; height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    font-weight: 900;
    font-size: 24px;
    background: rgba(20, 20, 28, 0.6);
    border: 1px solid var(--border-gold);
    color: var(--gold-light);
}

.rank-1 .lb-rank-badge {
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: var(--bg-deep);
    box-shadow: 0 6px 20px var(--gold-glow);
    font-size: 28px;
    border-color: var(--gold);
}

.rank-2 .lb-rank-badge { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: var(--bg-deep); }
.rank-3 .lb-rank-badge { background: linear-gradient(135deg, #d97706, #b45309); color: white; }

.lb-avatar-big {
    width: 64px; height: 64px;
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 900;
    border: 2px solid var(--border-gold);
}

.lb-avatar-big img { width: 100%; height: 100%; object-fit: cover; }

.lb-info-main {
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 800;
    margin-bottom: 4px;
    color: var(--gold-light);
}

.lb-info-sub {
    font-size: 13px;
    color: rgba(247, 231, 206, 0.5);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
}

.lb-stats-display { text-align: center; min-width: 110px; }

.lb-likes-big {
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 900;
    color: var(--danger);
    line-height: 1;
}

.lb-likes-label {
    font-size: 11px;
    color: rgba(247, 231, 206, 0.5);
    margin-top: 4px;
}

.click-hint {
    position: absolute;
    bottom: 6px;
    left: 12px;
    font-size: 9px;
    color: rgba(212, 175, 55, 0.5);
    letter-spacing: 1px;
    pointer-events: none;
}

/* ============== DETAILS MODAL ============== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(15px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
    animation: fadeIn 0.3s;
}

.modal-overlay.active { display: flex; }

.details-modal {
    background: linear-gradient(135deg, var(--bg-card), rgba(30, 25, 15, 0.95));
    border: 1px solid var(--border-gold-strong);
    border-radius: 20px;
    max-width: 1100px;
    width: 100%;
    max-height: 92vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: zoomIn 0.3s;
    box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6), 0 0 80px rgba(212, 175, 55, 0.2);
    position: relative;
}

.details-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.details-header {
    padding: 22px 26px;
    border-bottom: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    gap: 16px;
}

.details-header-avatar {
    width: 64px; height: 64px;
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    border: 2px solid var(--gold);
    flex-shrink: 0;
}

.details-header-avatar img { width: 100%; height: 100%; object-fit: cover; }

.details-header-info { flex: 1; min-width: 0; }

.details-header-name {
    font-size: 22px;
    font-weight: 800;
    color: var(--gold-light);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
}

.details-header-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
}

.details-close {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.3);
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    flex-shrink: 0;
    transition: all 0.3s;
}

.details-close:hover { background: rgba(239, 68, 68, 0.2); }

.details-stats-row {
    padding: 14px 26px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    border-bottom: 1px solid var(--border-gold);
    background: rgba(20, 20, 28, 0.3);
}

@media (max-width: 600px) { .details-stats-row { grid-template-columns: repeat(2, 1fr); } }

.details-stat {
    text-align: center;
    padding: 8px;
    background: rgba(212, 175, 55, 0.05);
    border-radius: 10px;
    border: 1px solid var(--border-gold);
}

.details-stat-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 3px;
}

.details-stat-value {
    font-size: 17px;
    font-weight: 800;
    color: var(--gold-light);
}

.details-platforms-tabs {
    padding: 12px 26px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border-gold);
}

.details-platform-tab {
    padding: 8px 16px;
    background: rgba(20, 20, 28, 0.5);
    border: 1px solid var(--border-gold);
    border-radius: 10px;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.3s;
}

.details-platform-tab:hover { background: rgba(212, 175, 55, 0.08); }

.details-platform-tab.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    border-color: transparent;
}

.details-posts-container {
    flex: 1;
    overflow-y: auto;
    padding: 18px 26px 26px;
}

.details-posts-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.detail-post-item {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px;
    background: linear-gradient(135deg, rgba(20, 20, 28, 0.6), rgba(20, 20, 28, 0.3));
    border: 1px solid var(--border-gold);
    border-radius: 12px;
    transition: all 0.3s;
}

.detail-post-item:hover {
    border-color: var(--border-gold-strong);
    background: rgba(212, 175, 55, 0.04);
}

.detail-post-thumb {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    background-color: rgba(0, 0, 0, 0.4);
    background-size: cover;
    background-position: center;
    cursor: pointer;
    border: 1px solid var(--border-gold);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
}

.detail-post-thumb.no-image::after {
    content: '🖼️';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    opacity: 0.3;
}

.detail-post-thumb-hint {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
    font-size: 20px;
    color: white;
}

.detail-post-thumb:hover .detail-post-thumb-hint { opacity: 1; }

.detail-post-info { min-width: 0; }

.detail-post-title {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.detail-post-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 10px;
    color: var(--text-muted);
}

.platform-badge {
    padding: 2px 7px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 9px;
}

.platform-badge.ig { background: rgba(225, 48, 108, 0.15); color: var(--instagram); }
.platform-badge.tt { background: rgba(37, 244, 238, 0.15); color: var(--tiktok); }
.platform-badge.sn { background: rgba(255, 252, 0, 0.15); color: var(--snapchat); }

.detail-post-stats {
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: center;
    min-width: 80px;
}

.detail-stat-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    font-size: 11px;
    color: var(--text-secondary);
}

.detail-stat-row.primary {
    color: var(--danger);
    font-weight: 700;
    font-size: 14px;
}

.detail-post-link {
    color: var(--gold);
    text-decoration: none;
    font-size: 10px;
    margin-top: 4px;
    display: block;
    text-align: center;
}

.detail-post-link:hover { color: var(--gold-light); }

.empty {
    text-align: center;
    padding: 60px 20px;
    color: rgba(247, 231, 206, 0.4);
    font-size: 16px;
}

.empty-icon { font-size: 56px; margin-bottom: 14px; opacity: 0.4; color: var(--gold); }

.last-update {
    text-align: center;
    margin-top: 28px;
    padding: 10px;
    font-size: 12px;
    color: rgba(247, 231, 206, 0.4);
}

.fullscreen-btn {
    position: fixed;
    top: 20px; left: 20px;
    padding: 10px 18px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 12px;
    color: var(--bg-deep);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 700;
    z-index: 100;
    box-shadow: 0 6px 16px var(--gold-glow);
    transition: transform 0.3s;
}

.fullscreen-btn:hover { transform: translateY(-2px); }

/* ============== ANIMATIONS ============== */
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes zoomIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.lb-row:nth-child(1) { animation-delay: 0.05s; }
.lb-row:nth-child(2) { animation-delay: 0.1s; }
.lb-row:nth-child(3) { animation-delay: 0.15s; }
.lb-row:nth-child(4) { animation-delay: 0.2s; }
.lb-row:nth-child(5) { animation-delay: 0.25s; }
.lb-row:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>
<body>

<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ ملء الشاشة</button>

<div class="display-container">
    <div class="display-header">
        <div class="display-logo" id="displayLogo">💎</div>
        <h1 class="display-title" id="displaySystemName">مجوهرات نفائس الألماس</h1>
        <div class="display-subtitle">عرض مباشر للنتائج</div>
        <div class="live-indicator">
            <span class="live-dot"></span>
            <span>LIVE · تحديث تلقائي</span>
        </div>
    </div>

    <div class="winner-spotlight" id="winnerSpotlight" style="display:none;">
        <div class="crown-big">👑</div>
        <div class="crown-label" id="winnerLabel">الفائز الحالي</div>
        <div class="crown-name" id="winnerName">-</div>
        <div class="crown-sub" id="winnerSub">-</div>
    </div>

    <div class="view-toggle">
        <button class="view-btn active" data-view="branches" onclick="setView('branches')">🏢 الفروع</button>
        <button class="view-btn" data-view="members" onclick="setView('members')">👤 الموظفين</button>
    </div>

    <div class="stats-row">
        <div class="stat-box"><div class="stat-box-label">الفروع</div><div class="stat-box-value" id="statBranches">0</div></div>
        <div class="stat-box"><div class="stat-box-label">الموظفين</div><div class="stat-box-value" id="statMembers">0</div></div>
        <div class="stat-box"><div class="stat-box-label">المنشورات</div><div class="stat-box-value" id="statPosts">0</div></div>
        <div class="stat-box"><div class="stat-box-label">إجمالي اللايكات</div><div class="stat-box-value" id="statLikes">0</div></div>
    </div>

    <div class="leaderboard" id="leaderboardList">
        <div class="empty"><div class="empty-icon">🎯</div><div>لا توجد بيانات بعد</div></div>
    </div>

    <div class="last-update" id="lastUpdate">آخر تحديث: --</div>
</div>

<!-- ============== DETAILS MODAL ============== -->
<div class="modal-overlay" id="detailsModal">
    <div class="details-modal">
        <div class="details-header">
            <div class="details-header-avatar" id="detailsAvatar">🏢</div>
            <div class="details-header-info">
                <div class="details-header-name" id="detailsName">-</div>
                <div class="details-header-sub" id="detailsSub">-</div>
            </div>
            <button class="details-close" onclick="closeDetailsModal()">✕</button>
        </div>

        <div class="details-stats-row">
            <div class="details-stat">
                <div class="details-stat-label">المنشورات</div>
                <div class="details-stat-value" id="detailsTotalPosts">0</div>
            </div>
            <div class="details-stat">
                <div class="details-stat-label">اللايكات</div>
                <div class="details-stat-value" id="detailsTotalLikes" style="color:var(--danger);">0</div>
            </div>
            <div class="details-stat">
                <div class="details-stat-label">المشاهدات</div>
                <div class="details-stat-value" id="detailsTotalViews">0</div>
            </div>
            <div class="details-stat">
                <div class="details-stat-label">التعليقات</div>
                <div class="details-stat-value" id="detailsTotalComments">0</div>
            </div>
        </div>

        <div class="details-platforms-tabs">
            <button class="details-platform-tab active" data-dp="all" onclick="setDetailsPlatform('all')">الكل</button>
            <button class="details-platform-tab" data-dp="instagram" onclick="setDetailsPlatform('instagram')">📷 Instagram</button>
            <button class="details-platform-tab" data-dp="tiktok" onclick="setDetailsPlatform('tiktok')">🎵 TikTok</button>
            <button class="details-platform-tab" data-dp="snapchat" onclick="setDetailsPlatform('snapchat')">👻 Snapchat</button>
        </div>

        <div class="details-posts-container">
            <div class="details-posts-list" id="detailsPostsList"></div>
        </div>
    </div>
</div>

<script>
let state = null;
let currentView = 'branches';
let currentDetailsType = null; // 'branch' أو 'member'
let currentDetailsId = null;
let currentDetailsPlatform = 'all';

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = String(text || '');
    return div.innerHTML;
}

function formatNumber(n) { return (n || 0).toLocaleString('ar-EG'); }

function formatDate(dateStr) {
    if (!dateStr || dateStr.length !== 8) return 'غير معروف';
    return `${dateStr.substring(0, 4)}/${dateStr.substring(4, 6)}/${dateStr.substring(6, 8)}`;
}

function setView(view) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    render();
}

// ============== Calculations ==============
function getMemberPosts(memberId) {
    if (!state) return [];
    const allPosts = [...(state.discoveredPosts || []), ...(state.manualPosts || [])];
    return allPosts.filter(p => p.assignedTo && p.assignedTo.memberId === memberId);
}

function getBranchPosts(branch) {
    const memberIds = branch.members.map(m => m.id);
    if (!state) return [];
    const allPosts = [...(state.discoveredPosts || []), ...(state.manualPosts || [])];
    return allPosts.filter(p => p.assignedTo && memberIds.includes(p.assignedTo.memberId));
}

function getMemberTotalLikes(memberId) {
    return getMemberPosts(memberId).reduce((s, p) => s + (p.likes || 0), 0);
}

function getMemberPostsCount(memberId) {
    return getMemberPosts(memberId).length;
}

function getBranchTotalLikes(branch) {
    return branch.members.reduce((s, m) => s + getMemberTotalLikes(m.id), 0);
}

function getBranchPostsCount(branch) {
    return branch.members.reduce((s, m) => s + getMemberPostsCount(m.id), 0);
}

// ============== Server Fetch ==============
async function fetchState() {
    try {
        const response = await fetch('/api/state');
        state = await response.json();
        render();
        // إذا الـ modal مفتوح، حدّث محتواه أيضًا
        if (document.getElementById('detailsModal').classList.contains('active')) {
            renderDetailsContent();
        }
    } catch (e) { console.error('Failed to fetch state:', e); }
}

function updateHeader() {
    if (!state) return;
    if (state.systemName) {
        document.getElementById('displaySystemName').textContent = state.systemName;
        document.title = '💎 ' + state.systemName;
    }
    const logoEl = document.getElementById('displayLogo');
    if (state.systemLogo) {
        logoEl.innerHTML = `<img src="${escapeHtml(state.systemLogo)}" alt="logo">`;
    } else {
        logoEl.textContent = '💎';
    }
}

function render() {
    if (!state) return;
    updateHeader();

    const branches = state.branches || [];
    const totalMembers = branches.reduce((s, b) => s + b.members.length, 0);
    const allPosts = [...(state.discoveredPosts || []), ...(state.manualPosts || [])];
    const assignedPosts = allPosts.filter(p => p.assignedTo);
    const totalLikes = assignedPosts.reduce((s, p) => s + (p.likes || 0), 0);

    document.getElementById('statBranches').textContent = branches.length;
    document.getElementById('statMembers').textContent = totalMembers;
    document.getElementById('statPosts').textContent = formatNumber(assignedPosts.length);
    document.getElementById('statLikes').textContent = formatNumber(totalLikes);

    const list = document.getElementById('leaderboardList');
    const spotlight = document.getElementById('winnerSpotlight');

    if (currentView === 'branches') renderBranches(list, spotlight);
    else renderMembers(list, spotlight);

    const lastUpdateEl = document.getElementById('lastUpdate');
    if (state.lastUpdate) {
        const d = new Date(state.lastUpdate);
        lastUpdateEl.textContent = `🔄 آخر تحديث: ${d.toLocaleString('ar-EG')}`;
    } else {
        lastUpdateEl.textContent = '🔄 لم يتم التحديث بعد';
    }
}

function renderBranches(list, spotlight) {
    const branches = state.branches || [];
    if (branches.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">🏢</div><div>لا توجد فروع بعد</div></div>`;
        spotlight.style.display = 'none';
        return;
    }

    const sorted = [...branches].map(b => ({
        ...b, totalLikes: getBranchTotalLikes(b), postsCount: getBranchPostsCount(b)
    })).sort((a, b) => b.totalLikes - a.totalLikes);

    list.innerHTML = sorted.map((branch, idx) => {
        const rank = idx + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        const avatar = branch.image
            ? `<img src="${escapeHtml(branch.image)}" alt="${escapeHtml(branch.name)}">`
            : (branch.name[0] || '🏢');
        return `
            <div class="lb-row ${rankClass}" onclick="openBranchDetails('${branch.id}')">
                <div class="lb-rank-badge">${medal}</div>
                <div class="lb-avatar-big">${avatar}</div>
                <div>
                    <div class="lb-info-main">${escapeHtml(branch.name)}</div>
                    <div class="lb-info-sub">
                        <span>${branch.members.length} موظف</span>
                        <span>•</span>
                        <span>${formatNumber(branch.postsCount)} منشور</span>
                    </div>
                </div>
                <div class="lb-stats-display">
                    <div class="lb-likes-big">${formatNumber(branch.totalLikes)}</div>
                    <div class="lb-likes-label">❤️ لايك</div>
                </div>
                <div class="click-hint">انقر للتفاصيل</div>
            </div>
        `;
    }).join('');

    if (sorted.length > 0 && sorted[0].totalLikes > 0) {
        document.getElementById('winnerLabel').textContent = '🏢 الفرع المتصدر';
        document.getElementById('winnerName').textContent = sorted[0].name;
        document.getElementById('winnerSub').textContent = `${formatNumber(sorted[0].totalLikes)} لايك · ${sorted[0].postsCount} منشور`;
        spotlight.style.display = 'block';
    } else {
        spotlight.style.display = 'none';
    }
}

function renderMembers(list, spotlight) {
    const branches = state.branches || [];
    const allMembers = branches.flatMap(b => b.members.map(m => ({
        ...m, branchName: b.name, branchId: b.id,
        totalLikes: getMemberTotalLikes(m.id),
        postsCount: getMemberPostsCount(m.id)
    })));

    if (allMembers.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><div>لا يوجد موظفون بعد</div></div>`;
        spotlight.style.display = 'none';
        return;
    }

    const sorted = allMembers.sort((a, b) => b.totalLikes - a.totalLikes);

    list.innerHTML = sorted.map((member, idx) => {
        const rank = idx + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        const avatar = member.image
            ? `<img src="${escapeHtml(member.image)}" alt="${escapeHtml(member.name)}">`
            : (member.name[0] || '👤');
        return `
            <div class="lb-row ${rankClass}" onclick="openMemberDetails('${member.id}')">
                <div class="lb-rank-badge">${medal}</div>
                <div class="lb-avatar-big">${avatar}</div>
                <div>
                    <div class="lb-info-main">${escapeHtml(member.name)}</div>
                    <div class="lb-info-sub">
                        <span>🏢 ${escapeHtml(member.branchName)}</span>
                        <span>•</span>
                        <span>${formatNumber(member.postsCount)} منشور</span>
                    </div>
                </div>
                <div class="lb-stats-display">
                    <div class="lb-likes-big">${formatNumber(member.totalLikes)}</div>
                    <div class="lb-likes-label">❤️ لايك</div>
                </div>
                <div class="click-hint">انقر للتفاصيل</div>
            </div>
        `;
    }).join('');

    if (sorted.length > 0 && sorted[0].totalLikes > 0) {
        document.getElementById('winnerLabel').textContent = '👤 الموظف المتصدر';
        document.getElementById('winnerName').textContent = sorted[0].name;
        document.getElementById('winnerSub').textContent = `${escapeHtml(sorted[0].branchName)} · ${formatNumber(sorted[0].totalLikes)} لايك`;
        spotlight.style.display = 'block';
    } else {
        spotlight.style.display = 'none';
    }
}

// ============== Details Modal ==============
function openBranchDetails(branchId) {
    if (!state) return;
    const branch = state.branches.find(b => b.id === branchId);
    if (!branch) return;
    currentDetailsType = 'branch';
    currentDetailsId = branchId;
    currentDetailsPlatform = 'all';
    document.querySelectorAll('.details-platform-tab').forEach(t => t.classList.toggle('active', t.dataset.dp === 'all'));
    renderDetailsContent();
    document.getElementById('detailsModal').classList.add('active');
}

function openMemberDetails(memberId) {
    if (!state) return;
    currentDetailsType = 'member';
    currentDetailsId = memberId;
    currentDetailsPlatform = 'all';
    document.querySelectorAll('.details-platform-tab').forEach(t => t.classList.toggle('active', t.dataset.dp === 'all'));
    renderDetailsContent();
    document.getElementById('detailsModal').classList.add('active');
}

function closeDetailsModal() {
    document.getElementById('detailsModal').classList.remove('active');
    currentDetailsType = null;
    currentDetailsId = null;
}

function setDetailsPlatform(platform) {
    currentDetailsPlatform = platform;
    document.querySelectorAll('.details-platform-tab').forEach(t => t.classList.toggle('active', t.dataset.dp === platform));
    renderDetailsPosts();
}

function renderDetailsContent() {
    if (!currentDetailsType || !currentDetailsId || !state) return;

    const avatarEl = document.getElementById('detailsAvatar');
    const nameEl = document.getElementById('detailsName');
    const subEl = document.getElementById('detailsSub');

    if (currentDetailsType === 'branch') {
        const branch = state.branches.find(b => b.id === currentDetailsId);
        if (!branch) { closeDetailsModal(); return; }

        avatarEl.innerHTML = branch.image
            ? `<img src="${escapeHtml(branch.image)}" alt="${escapeHtml(branch.name)}">`
            : (branch.name[0] || '🏢');
        nameEl.textContent = '🏢 ' + branch.name;
        subEl.textContent = `${branch.members.length} موظف · فرع`;
    } else {
        // member
        let foundMember = null, foundBranch = null;
        for (const b of state.branches) {
            const m = b.members.find(m => m.id === currentDetailsId);
            if (m) { foundMember = m; foundBranch = b; break; }
        }
        if (!foundMember) { closeDetailsModal(); return; }

        avatarEl.innerHTML = foundMember.image
            ? `<img src="${escapeHtml(foundMember.image)}" alt="${escapeHtml(foundMember.name)}">`
            : (foundMember.name[0] || '👤');
        nameEl.textContent = '👤 ' + foundMember.name;
        subEl.textContent = `🏢 ${foundBranch.name}`;
    }

    // Stats
    const posts = getDetailsPosts();
    const totalLikes = posts.reduce((s, p) => s + (p.likes || 0), 0);
    const totalViews = posts.reduce((s, p) => s + (p.views || 0), 0);
    const totalComments = posts.reduce((s, p) => s + (p.comments || 0), 0);

    document.getElementById('detailsTotalPosts').textContent = formatNumber(posts.length);
    document.getElementById('detailsTotalLikes').textContent = formatNumber(totalLikes);
    document.getElementById('detailsTotalViews').textContent = formatNumber(totalViews);
    document.getElementById('detailsTotalComments').textContent = formatNumber(totalComments);

    renderDetailsPosts();
}

function getDetailsPosts() {
    if (!currentDetailsType || !currentDetailsId || !state) return [];
    if (currentDetailsType === 'branch') {
        const branch = state.branches.find(b => b.id === currentDetailsId);
        if (!branch) return [];
        return getBranchPosts(branch);
    } else {
        return getMemberPosts(currentDetailsId);
    }
}

function renderDetailsPosts() {
    let posts = getDetailsPosts();
    if (currentDetailsPlatform !== 'all') {
        posts = posts.filter(p => p.platform === currentDetailsPlatform);
    }

    const container = document.getElementById('detailsPostsList');
    if (posts.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>لا توجد منشورات في هذه المنصة</div></div>`;
        return;
    }

    // ترتيب حسب اللايكات (الأعلى أولاً)
    const sorted = [...posts].sort((a, b) => (b.likes || 0) - (a.likes || 0));

    const PLATFORMS = {
        instagram: { name: 'Instagram', icon: '📷', class: 'ig' },
        tiktok: { name: 'TikTok', icon: '🎵', class: 'tt' },
        snapchat: { name: 'Snapchat', icon: '👻', class: 'sn' }
    };

    container.innerHTML = sorted.map(post => {
        const p = PLATFORMS[post.platform] || PLATFORMS.instagram;
        const thumb = post.thumbnail ? `background-image:url('${escapeHtml(post.thumbnail)}');` : '';
        const noImageClass = post.thumbnail ? '' : 'no-image';

        return `
            <div class="detail-post-item">
                <div class="detail-post-thumb ${noImageClass}" style="${thumb}" onclick="window.open('${escapeHtml(post.url)}','_blank')">
                    <div class="detail-post-thumb-hint">🔗</div>
                </div>
                <div class="detail-post-info">
                    <div class="detail-post-title">${escapeHtml(post.title || '(بدون نص)')}</div>
                    <div class="detail-post-meta">
                        <span class="platform-badge ${p.class}">${p.icon} ${p.name}</span>
                        <span>📅 ${formatDate(post.upload_date)}</span>
                        ${post.uploader ? `<span>@${escapeHtml(post.uploader)}</span>` : ''}
                    </div>
                </div>
                <div class="detail-post-stats">
                    <div class="detail-stat-row primary">❤️ ${formatNumber(post.likes)}</div>
                    ${post.views ? `<div class="detail-stat-row">👁️ ${formatNumber(post.views)}</div>` : ''}
                    ${post.comments ? `<div class="detail-stat-row">💬 ${formatNumber(post.comments)}</div>` : ''}
                    <a class="detail-post-link" href="${escapeHtml(post.url)}" target="_blank">فتح ↗</a>
                </div>
            </div>
        `;
    }).join('');
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

// إغلاق الـ modal عند الضغط خارجه
document.getElementById('detailsModal').addEventListener('click', (e) => {
    if (e.target.id === 'detailsModal') closeDetailsModal();
});

// ESC يغلق الـ modal
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetailsModal();
});

// ⚠️ التحديث من السيرفر كل 30 ثانية (بدون تبديل تلقائي للعرض)
setInterval(fetchState, 30000);

// تحميل أول مرة
fetchState();
</script>

</body>
</html>
