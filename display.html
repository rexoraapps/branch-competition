<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏆 شاشة العرض - نظام المسابقات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg-deep: #08080d;
    --bg-card: #14141c;
    --bg-card-hover: #1c1c28;
    --gold: #d4af37;
    --gold-light: #f0d670;
    --gold-dark: #b8941e;
    --gold-glow: rgba(212, 175, 55, 0.4);
    --silver: #c0c0c0;
    --silver-light: #e8e8e8;
    --silver-dark: #909090;
    --bronze: #cd7f32;
    --bronze-light: #e89860;
    --bronze-dark: #a05a1f;
    --text-primary: #ffffff;
    --text-secondary: #c4b896;
    --text-muted: #7a7068;
    --danger: #ef4444;
    --success: #4ade80;
    --warning: #fbbf24;
    --info: #60a5fa;
    --border-gold: rgba(212, 175, 55, 0.25);
    --border-subtle: rgba(255, 255, 255, 0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
    overflow-x: hidden;
}

body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    background-image: 
        radial-gradient(ellipse at top, rgba(212, 175, 55, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at bottom, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
    padding-bottom: 120px;
}

/* ========== HEADER ========== */
.app-header {
    background: linear-gradient(180deg, rgba(20, 20, 28, 0.98), rgba(8, 8, 13, 0.95));
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-gold);
    padding: 14px 14px 12px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.app-header::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.system-logo {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
}

.system-logo img {
    width: 100%; height: 100%;
    object-fit: cover;
}

.system-title-area {
    flex: 1;
    min-width: 0;
}

.system-title {
    font-size: 16px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.system-subtitle {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
}

.live-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid var(--danger);
    border-radius: 50px;
    padding: 3px 8px;
    font-size: 9px;
    font-weight: 800;
    color: var(--danger);
}

.live-dot {
    width: 6px; height: 6px;
    background: var(--danger);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* Filter & View Tabs */
.header-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.view-tabs {
    display: flex;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 10px;
    padding: 3px;
    gap: 3px;
}

.view-tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.view-tab.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
}

.period-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
    scrollbar-width: none;
}

.period-tabs::-webkit-scrollbar { display: none; }

.period-tab {
    flex-shrink: 0;
    padding: 6px 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border-subtle);
    border-radius: 50px;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}

.period-tab.active {
    background: rgba(212, 175, 55, 0.15);
    border-color: var(--gold);
    color: var(--gold-light);
}

/* ========== STATS ROW ========== */
.stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 14px;
    background: linear-gradient(180deg, rgba(20, 20, 28, 0.6), transparent);
}

.stat-mini {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
    border: 1px solid var(--border-gold);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.stat-mini::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.stat-mini-icon {
    font-size: 16px;
    margin-bottom: 2px;
}

.stat-mini-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-bottom: 3px;
    line-height: 1;
}

.stat-mini-value {
    font-size: 14px;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
}

.stat-mini-value.red { color: var(--danger); }
.stat-mini-value.green { color: var(--success); }

/* ========== PODIUM (3 Top) ========== */
.podium-section {
    padding: 8px 14px 14px;
    position: relative;
}

.podium-title {
    text-align: center;
    margin-bottom: 16px;
    position: relative;
}

.podium-title::before, .podium-title::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40px;
    height: 1px;
    background: var(--border-gold);
}

.podium-title::before { right: 0; }
.podium-title::after { left: 0; }

.podium-title-text {
    display: inline-block;
    padding: 0 12px;
    font-size: 12px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 1px;
}

.podium {
    display: grid;
    grid-template-columns: 1fr 1.15fr 1fr;
    align-items: end;
    gap: 8px;
    max-width: 100%;
    margin: 0 auto;
}

.podium-place {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s;
}

.podium-place:active { transform: scale(0.97); }

.podium-avatar-wrapper {
    position: relative;
    margin-bottom: 8px;
}

.podium-avatar {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
    overflow: hidden;
    font-weight: 900;
    color: var(--gold);
}

.podium-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
}

.podium-place-1 .podium-avatar {
    width: 84px; height: 84px;
    border: 4px solid var(--gold);
    box-shadow: 0 0 24px var(--gold-glow), 0 8px 20px rgba(0,0,0,0.5);
    font-size: 32px;
}

.podium-place-2 .podium-avatar {
    width: 68px; height: 68px;
    border: 3px solid var(--silver);
    box-shadow: 0 0 16px rgba(192, 192, 192, 0.3), 0 6px 16px rgba(0,0,0,0.5);
    font-size: 26px;
}

.podium-place-3 .podium-avatar {
    width: 68px; height: 68px;
    border: 3px solid var(--bronze);
    box-shadow: 0 0 16px rgba(205, 127, 50, 0.3), 0 6px 16px rgba(0,0,0,0.5);
    font-size: 26px;
}

.podium-medal {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border: 3px solid var(--bg-deep);
    z-index: 2;
}

.podium-place-1 .podium-medal {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
}

.podium-place-2 .podium-medal {
    background: linear-gradient(135deg, #e8e8e8, #b0b0b0);
}

.podium-place-3 .podium-medal {
    background: linear-gradient(135deg, #e89860, #a05a1f);
}

.podium-crown {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    filter: drop-shadow(0 0 8px var(--gold-glow));
    animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-6px); }
}

.podium-name {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-primary);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
    padding: 0 4px;
}

.podium-place-1 .podium-name { font-size: 13px; }

.podium-likes {
    font-size: 16px;
    font-weight: 900;
    color: var(--danger);
    margin-bottom: 6px;
    line-height: 1;
}

.podium-place-1 .podium-likes { font-size: 18px; }

.podium-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 8px;
}

.podium-base {
    width: 100%;
    border-radius: 12px 12px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: var(--bg-deep);
    position: relative;
    overflow: hidden;
}

.podium-base::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 60%;
    background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
}

.podium-place-1 .podium-base {
    height: 90px;
    background: linear-gradient(180deg, var(--gold-light), var(--gold), var(--gold-dark));
    box-shadow: 0 -4px 20px var(--gold-glow);
}

.podium-place-2 .podium-base {
    height: 70px;
    background: linear-gradient(180deg, #e8e8e8, var(--silver), var(--silver-dark));
}

.podium-place-3 .podium-base {
    height: 55px;
    background: linear-gradient(180deg, var(--bronze-light), var(--bronze), var(--bronze-dark));
    color: white;
}

.podium-rank-number {
    font-size: 36px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.podium-place-1 .podium-rank-number {
    font-size: 44px;
}

/* ========== RANK LIST (4+) ========== */
.rank-list-section {
    padding: 0 14px;
}

.section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 12px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
}

.section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
}

.rank-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
}

.rank-item:active {
    transform: scale(0.98);
}

.rank-item:hover {
    border-color: var(--border-gold);
    background: linear-gradient(135deg, var(--bg-card-hover), rgba(26, 26, 38, 0.8));
}

.rank-item-number {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 14px;
    color: var(--gold);
    flex-shrink: 0;
}

.rank-item-avatar {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
    border: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
    overflow: hidden;
    flex-shrink: 0;
}

.rank-item-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
}

.rank-item-info {
    flex: 1;
    min-width: 0;
}

.rank-item-name {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.rank-item-meta {
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
}

.rank-item-meta-dot {
    width: 3px; height: 3px;
    background: var(--text-muted);
    border-radius: 50%;
}

.rank-item-stats {
    text-align: left;
    flex-shrink: 0;
}

.rank-item-likes {
    font-size: 15px;
    font-weight: 900;
    color: var(--danger);
    line-height: 1;
}

.rank-item-likes-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 2px;
}

/* Empty State */
.empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
}

.empty-icon {
    font-size: 56px;
    margin-bottom: 12px;
    opacity: 0.4;
}

.empty-text {
    font-size: 14px;
    font-weight: 700;
}

/* ========== FLOATING ACTIONS ========== */
.float-actions {
    position: fixed;
    bottom: 14px;
    right: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
}

.float-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg-deep);
    font-size: 18px;
    text-decoration: none;
    box-shadow: 0 4px 16px var(--gold-glow);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}

.float-btn:active { transform: scale(0.92); }
.float-btn:hover { transform: scale(1.05); }

/* زر التحديث المميز */
.float-btn.refresh-btn {
    background: linear-gradient(135deg, #16a34a, #4ade80);
    border-color: #4ade80;
    color: white;
    box-shadow: 0 4px 16px rgba(74, 222, 128, 0.5);
    width: 56px; height: 56px;
    font-size: 22px;
    position: relative;
}

.float-btn.refresh-btn::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: linear-gradient(135deg, #16a34a, #4ade80);
    opacity: 0.3;
    z-index: -1;
    animation: pulseGreen 2s infinite;
}

@keyframes pulseGreen {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.2); opacity: 0; }
}

.float-btn.refresh-btn.spinning {
    animation: spin 1s linear infinite;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border-color: var(--gold);
    color: var(--bg-deep);
}

.float-btn.refresh-btn.spinning::after { display: none; }

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Toast notification */
.toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: linear-gradient(135deg, #16a34a, #4ade80);
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease-out;
    pointer-events: none;
    border: 2px solid rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 90vw;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.toast.error {
    background: linear-gradient(135deg, #dc2626, #ef4444);
}

.toast.warning {
    background: linear-gradient(135deg, #d97706, #fbbf24);
    color: #0a0a0f;
}

/* ========== FOOTER CREDIT ========== */
.app-footer {
    text-align: center;
    padding: 20px 14px 30px;
    color: var(--text-muted);
    font-size: 11px;
}

.developer-credit {
    display: inline-block;
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(212, 175, 55, 0.03));
    border: 1px solid var(--border-gold);
    border-radius: 50px;
    padding: 8px 16px;
    margin-top: 6px;
    color: var(--gold-light);
    font-weight: 700;
    font-size: 11px;
}

.developer-credit strong {
    color: var(--gold);
}

/* ========== MODAL (Details) - Reuse Existing ========== */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 20px 10px;
}

.modal-overlay.active { display: flex; }

.details-modal {
    background: linear-gradient(180deg, var(--bg-card-hover), var(--bg-card));
    border: 1px solid var(--border-gold);
    border-radius: 20px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    overflow: hidden;
    position: relative;
}

.details-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.details-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    border-bottom: 1px solid var(--border-subtle);
    background: rgba(212, 175, 55, 0.04);
}

.details-header-avatar {
    width: 60px; height: 60px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
}

.details-header-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
}

.details-header-info { flex: 1; min-width: 0; }

.details-header-name {
    font-size: 18px;
    font-weight: 900;
    color: var(--gold-light);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.details-header-sub {
    font-size: 11px;
    color: var(--text-muted);
}

.details-close {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--danger);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.details-stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 12px;
    background: rgba(10, 10, 15, 0.4);
}

.details-stat {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
}

.details-stat-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-bottom: 4px;
}

.details-stat-value {
    font-size: 14px;
    font-weight: 900;
    color: var(--gold-light);
}

.details-platforms-tabs {
    display: flex;
    gap: 6px;
    padding: 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: rgba(10, 10, 15, 0.3);
}

.details-platforms-tabs::-webkit-scrollbar { display: none; }

.details-platform-tab {
    flex-shrink: 0;
    padding: 6px 12px;

<script>
let state = null;
let currentView = 'branches';
let currentDetailsType = null;
let currentDetailsId = null;
let currentDetailsPlatform = 'all';
let currentPeriod = 'all';
let customStartDate = null;
let customEndDate = null;
let previousRanking = {};

// ============== Utilities ==============
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = String(text || '');
    return div.innerHTML;
}

function formatNumber(n) { return (n || 0).toLocaleString('ar-EG'); }

function formatDate(dateStr) {
    if (!dateStr || dateStr.length !== 8) return 'غير معروف';
    return `${dateStr.substring(0, 4)}/${dateStr.substring(4, 6)}/${dateStr.substring(6, 8)}`;
}

function parseUploadDate(str) {
    if (!str) return null;
    if (/^\d{8}$/.test(str)) {
        return new Date(parseInt(str.substring(0,4)), parseInt(str.substring(4,6))-1, parseInt(str.substring(6,8)));
    }
    const d = new Date(str);
    return isNaN(d) ? null : d;
}

// ============== Date Helpers (Saudi Week: Sat-Fri) ==============
function getCurrentSaturday() {
    const now = new Date();
    const day = now.getDay(); // 0=Sun
    const daysSinceSat = (day + 1) % 7;
    const sat = new Date(now);
    sat.setDate(now.getDate() - daysSinceSat);
    sat.setHours(0, 0, 0, 0);
    return sat;
}

function getLastSaturday() {
    const cur = getCurrentSaturday();
    const last = new Date(cur);
    last.setDate(cur.getDate() - 7);
    return last;
}

function getCurrentMonthStart() {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
}

function getPeriodRange() {
    const now = new Date();
    if (currentPeriod === 'all') return { start: null, end: null };
    if (currentPeriod === 'current_week') {
        return { start: getCurrentSaturday(), end: now };
    }
    if (currentPeriod === 'last_week') {
        const last = getLastSaturday();
        const end = new Date(getCurrentSaturday().getTime() - 1);
        return { start: last, end };
    }
    if (currentPeriod === 'current_month') {
        return { start: getCurrentMonthStart(), end: now };
    }
    if (currentPeriod === 'custom') {
        return { start: customStartDate, end: customEndDate };
    }
    return { start: null, end: null };
}

function getPeriodLabel() {
    if (currentPeriod === 'all') return 'كل الفترات';
    if (currentPeriod === 'current_week') {
        const sat = getCurrentSaturday();
        return `الأسبوع الحالي (السبت ${sat.getDate()}/${sat.getMonth()+1})`;
    }
    if (currentPeriod === 'last_week') return 'الأسبوع الماضي';
    if (currentPeriod === 'current_month') {
        const d = new Date();
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        return `${months[d.getMonth()]} ${d.getFullYear()}`;
    }
    if (currentPeriod === 'custom' && customStartDate && customEndDate) {
        const s = customStartDate, e = customEndDate;
        return `${s.getDate()}/${s.getMonth()+1} - ${e.getDate()}/${e.getMonth()+1}`;
    }
    return 'مخصص';
}

function isPostInPeriod(post) {
    const { start, end } = getPeriodRange();
    if (!start && !end) return true;
    const d = parseUploadDate(post.upload_date);
    if (!d) return true; // إذا ما له تاريخ، نخليه يظهر
    if (start && d < start) return false;
    if (end && d > end) return false;
    return true;
}

// ============== Data Helpers ==============
function getAllPosts() {
    if (!state) return [];
    return [...(state.discoveredPosts || []), ...(state.manualPosts || [])];
}

function getFilteredPosts() {
    return getAllPosts().filter(p => p.assignedTo && isPostInPeriod(p));
}

function getMemberPosts(memberId) {
    return getFilteredPosts().filter(p => p.assignedTo === memberId);
}

function getMemberStats(memberId) {
    const posts = getMemberPosts(memberId);
    return {
        posts: posts.length,
        likes: posts.reduce((s, p) => s + (p.likes || 0), 0),
        views: posts.reduce((s, p) => s + (p.views || 0), 0),
        comments: posts.reduce((s, p) => s + (p.comments || 0), 0)
    };
}

function getBranchStats(branch) {
    const memberIds = (branch.members || []).map(m => m.id);
    const posts = getFilteredPosts().filter(p => memberIds.includes(p.assignedTo));
    return {
        posts: posts.length,
        likes: posts.reduce((s, p) => s + (p.likes || 0), 0),
        views: posts.reduce((s, p) => s + (p.views || 0), 0),
        comments: posts.reduce((s, p) => s + (p.comments || 0), 0),
        members: (branch.members || []).length
    };
}

// ============== View Switching ==============
function setView(view) {
    currentView = view;
    document.querySelectorAll('[data-view]').forEach(b => {
        b.classList.toggle('active', b.dataset.view === view);
    });
    renderAll();
}

function setPeriod(period) {
    currentPeriod = period;
    document.querySelectorAll('[data-period]').forEach(b => {
        b.classList.toggle('active', b.dataset.period === period);
    });
    if (period !== 'custom') {
        document.getElementById('dateFilterPanel').classList.remove('active');
    }
    renderAll();
}

function toggleCustomDate() {
    setPeriod('custom');
    document.getElementById('dateFilterPanel').classList.add('active');
}

function applyCustomDate() {
    const startVal = document.getElementById('startDate').value;
    const endVal = document.getElementById('endDate').value;
    if (!startVal || !endVal) {
        alert('الرجاء اختيار التواريخ');
        return;
    }
    customStartDate = new Date(startVal);
    customStartDate.setHours(0,0,0,0);
    customEndDate = new Date(endVal);
    customEndDate.setHours(23,59,59,999);
    renderAll();
}

// ============== Render Stats Row ==============
function renderStats() {
    const branches = state.branches || [];
    const totalMembers = branches.reduce((s, b) => s + (b.members || []).length, 0);
    const posts = getFilteredPosts();
    const totalLikes = posts.reduce((s, p) => s + (p.likes || 0), 0);
    const totalViews = posts.reduce((s, p) => s + (p.views || 0), 0);
    const totalComments = posts.reduce((s, p) => s + (p.comments || 0), 0);
    
    document.getElementById('statBranches').textContent = formatNumber(branches.length);
    document.getElementById('statMembers').textContent = formatNumber(totalMembers);
    document.getElementById('statPosts').textContent = formatNumber(posts.length);
    document.getElementById('statLikes').textContent = formatNumber(totalLikes);
    document.getElementById('statViews').textContent = formatNumber(totalViews);
    document.getElementById('statComments').textContent = formatNumber(totalComments);
    
    document.getElementById('periodLabel').textContent = getPeriodLabel();
}

// ============== Render Podium (Top 3) ==============
function renderPodium(items) {
    const podiumSection = document.getElementById('podiumSection');
    const podiumContainer = document.getElementById('podiumContainer');
    const divider = document.getElementById('rankListDivider');
    
    const top3 = items.filter(it => it.likes > 0).slice(0, 3);
    
    if (top3.length === 0) {
        podiumSection.style.display = 'none';
        divider.style.display = 'none';
        return;
    }
    
    podiumSection.style.display = 'block';
    if (items.length > 3) divider.style.display = 'flex';
    else divider.style.display = 'none';
    
    // ترتيب الـ podium: 2 - 1 - 3 (للعرض)
    const order = [];
    if (top3[1]) order.push({ ...top3[1], rank: 2 });
    if (top3[0]) order.push({ ...top3[0], rank: 1 });
    if (top3[2]) order.push({ ...top3[2], rank: 3 });
    
    podiumContainer.innerHTML = order.map(item => {
        const avatar = item.image
            ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}">`
            : (item.name[0] || (currentView === 'branches' ? '🏢' : '👤'));
        const medal = item.rank === 1 ? '🥇' : item.rank === 2 ? '🥈' : '🥉';
        const crown = item.rank === 1 ? '<div class="podium-crown">👑</div>' : '';
        const onclickFn = currentView === 'branches' 
            ? `openBranchDetails('${item.id}')` 
            : `openMemberDetails('${item.id}')`;
        const subText = currentView === 'branches'
            ? `${item.members} موظف · ${item.posts} منشور`
            : `${item.branchName} · ${item.posts} منشور`;
        
        return `
            <div class="podium-place podium-place-${item.rank}" onclick="${onclickFn}">
                <div class="podium-avatar-wrapper">
                    ${crown}
                    <div class="podium-avatar">${avatar}</div>
                    <div class="podium-medal">${medal}</div>
                </div>
                <div class="podium-name">${escapeHtml(item.name)}</div>
                <div class="podium-likes">${formatNumber(item.likes)} ❤️</div>
                <div class="podium-meta">${escapeHtml(subText)}</div>
                <div class="podium-base">
                    <span class="podium-rank-number">${item.rank}</span>
                </div>
            </div>
        `;
    }).join('');
}

// ============== Render Rank List (4+) ==============
function renderRankList(items) {
    const rankList = document.getElementById('rankList');
    const rest = items.slice(3);
    
    if (items.length === 0) {
        rankList.innerHTML = `
            <div class="empty">
                <div class="empty-icon">${currentView === 'branches' ? '🏢' : '👤'}</div>
                <div class="empty-text">لا توجد ${currentView === 'branches' ? 'فروع' : 'موظفون'} بعد</div>
            </div>
        `;
        return;
    }
    
    // إذا كل الـ items <= 3، اعرض الكل في podium
    if (items.length <= 3 && items[0].likes > 0) {
        rankList.innerHTML = '';
        return;
    }
    
    // إذا أول item لايكاته 0، اعرض كل الـ items في القائمة
    if (items[0].likes === 0) {
        rankList.innerHTML = items.map((item, idx) => buildRankItem(item, idx + 1)).join('');
        return;
    }
    
    if (rest.length === 0) {
        rankList.innerHTML = '';
        return;
    }
    
    rankList.innerHTML = rest.map((item, idx) => buildRankItem(item, idx + 4)).join('');
}

function buildRankItem(item, rank) {
    const avatar = item.image
        ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}">`
        : (item.name[0] || (currentView === 'branches' ? '🏢' : '👤'));
    const onclickFn = currentView === 'branches' 
        ? `openBranchDetails('${item.id}')` 
        : `openMemberDetails('${item.id}')`;
    const meta = currentView === 'branches'
        ? `<span>${item.members} موظف</span><span class="rank-item-meta-dot"></span><span>${item.posts} منشور</span>`
        : `<span>🏢 ${escapeHtml(item.branchName)}</span><span class="rank-item-meta-dot"></span><span>${item.posts} منشور</span>`;
    
    return `
        <div class="rank-item" onclick="${onclickFn}">
            <div class="rank-item-number">${rank}</div>
            <div class="rank-item-avatar">${avatar}</div>
            <div class="rank-item-info">
                <div class="rank-item-name">${escapeHtml(item.name)}</div>
                <div class="rank-item-meta">${meta}</div>
            </div>
            <div class="rank-item-stats">
                <div class="rank-item-likes">${formatNumber(item.likes)}</div>
                <div class="rank-item-likes-label">❤️ لايك</div>
            </div>
        </div>
    `;
}

// ============== Render Branches ==============
function renderBranches() {
    const branches = state.branches || [];
    const items = branches.map(b => {
        const stats = getBranchStats(b);
        return { ...b, ...stats };
    }).sort((a, b) => b.likes - a.likes);
    
    renderPodium(items);
    renderRankList(items);
}

// ============== Render Members ==============
function renderMembers() {
    const branches = state.branches || [];
    const allMembers = branches.flatMap(b => 
        (b.members || []).map(m => {
            const stats = getMemberStats(m.id);
            return { ...m, ...stats, branchName: b.name, branchId: b.id };
        })
    ).sort((a, b) => b.likes - a.likes);
    
    renderPodium(allMembers);
    renderRankList(allMembers);
}

// ============== Render All ==============
function renderAll() {
    if (!state) return;
    
    // Update system info
    if (state.systemName) {
        document.getElementById('systemTitle').textContent = state.systemName;
    }
    if (state.systemLogo) {
        document.getElementById('systemLogo').innerHTML = `<img src="${escapeHtml(state.systemLogo)}" alt="logo">`;
    }
    
    renderStats();
    if (currentView === 'branches') renderBranches();
    else renderMembers();
    
    // إذا الـ modal مفتوح، حدّث محتواه
    if (currentDetailsId) {
        if (currentDetailsType === 'branch') openBranchDetails(currentDetailsId, true);
        else if (currentDetailsType === 'member') openMemberDetails(currentDetailsId, true);
    }
}

// ============== Details Modal ==============
function openBranchDetails(branchId, isRefresh = false) {
    const branch = (state.branches || []).find(b => b.id === branchId);
    if (!branch) return;
    
    currentDetailsType = 'branch';
    currentDetailsId = branchId;
    if (!isRefresh) currentDetailsPlatform = 'all';
    
    const avatar = branch.image
        ? `<img src="${escapeHtml(branch.image)}" alt="${escapeHtml(branch.name)}">`
        : (branch.name[0] || '🏢');
    document.getElementById('detailsAvatar').innerHTML = avatar;
    document.getElementById('detailsName').textContent = branch.name;
    document.getElementById('detailsSub').textContent = `🏢 فرع · ${(branch.members || []).length} موظف`;
    
    const stats = getBranchStats(branch);
    document.getElementById('detailsTotalPosts').textContent = formatNumber(stats.posts);
    document.getElementById('detailsTotalLikes').textContent = formatNumber(stats.likes);
    document.getElementById('detailsTotalViews').textContent = formatNumber(stats.views);
    document.getElementById('detailsTotalComments').textContent = formatNumber(stats.comments);
    
    renderDetailsPosts();
    document.getElementById('detailsModal').classList.add('active');
}

function openMemberDetails(memberId, isRefresh = false) {
    let member = null, branchName = '';
    for (const b of state.branches || []) {
        const m = (b.members || []).find(m => m.id === memberId);
        if (m) { member = m; branchName = b.name; break; }
    }
    if (!member) return;
    
    currentDetailsType = 'member';
    currentDetailsId = memberId;
    if (!isRefresh) currentDetailsPlatform = 'all';
    
    const avatar = member.image
        ? `<img src="${escapeHtml(member.image)}" alt="${escapeHtml(member.name)}">`
        : (member.name[0] || '👤');
    document.getElementById('detailsAvatar').innerHTML = avatar;
    document.getElementById('detailsName').textContent = member.name;
    document.getElementById('detailsSub').textContent = `👤 موظف · 🏢 ${branchName}`;
    
    const stats = getMemberStats(memberId);
    document.getElementById('detailsTotalPosts').textContent = formatNumber(stats.posts);
    document.getElementById('detailsTotalLikes').textContent = formatNumber(stats.likes);
    document.getElementById('detailsTotalViews').textContent = formatNumber(stats.views);
    document.getElementById('detailsTotalComments').textContent = formatNumber(stats.comments);
    
    renderDetailsPosts();
    document.getElementById('detailsModal').classList.add('active');
}

function setDetailsPlatform(platform) {
    currentDetailsPlatform = platform;
    document.querySelectorAll('[data-dp]').forEach(b => {
        b.classList.toggle('active', b.dataset.dp === platform);
    });
    renderDetailsPosts();
}

function getDetailsPosts() {
    if (currentDetailsType === 'branch') {
        const branch = (state.branches || []).find(b => b.id === currentDetailsId);
        if (!branch) return [];
        const memberIds = (branch.members || []).map(m => m.id);
        return getFilteredPosts().filter(p => memberIds.includes(p.assignedTo));
    } else if (currentDetailsType === 'member') {
        return getMemberPosts(currentDetailsId);
    }
    return [];
}

function renderDetailsPosts() {
    let posts = getDetailsPosts();
    if (currentDetailsPlatform !== 'all') {
        posts = posts.filter(p => p.platform === currentDetailsPlatform);
    }

    const container = document.getElementById('detailsPostsList');
    if (posts.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">لا توجد منشورات</div></div>`;
        return;
    }

    const sorted = [...posts].sort((a, b) => (b.likes || 0) - (a.likes || 0));

    const PLATFORMS = {
        instagram: { name: 'Instagram', icon: '📷', class: 'ig' },
        tiktok: { name: 'TikTok', icon: '🎵', class: 'tt' },
        snapchat: { name: 'Snapchat', icon: '👻', class: 'sn' }
    };

    container.innerHTML = sorted.map(post => {
        const p = PLATFORMS[post.platform] || PLATFORMS.instagram;
        const thumb = post.thumbnail ? `background-image:url('${escapeHtml(post.thumbnail)}');` : '';
        const noImageClass = post.thumbnail ? '' : 'no-image';

        return `
            <div class="detail-post-item">
                <div class="detail-post-thumb ${noImageClass}" style="${thumb}" onclick="window.open('${escapeHtml(post.url)}','_blank')">
                    <div class="detail-post-thumb-hint">🔗</div>
                </div>
                <div class="detail-post-info">
                    <div class="detail-post-title">${escapeHtml(post.title || 'منشور بدون عنوان')}</div>
                    <div class="detail-post-meta">
                        <span class="platform-badge ${p.class}">${p.icon} ${p.name}</span>
                        <span>📅 ${formatDate(post.upload_date)}</span>
                    </div>
                </div>
                <div class="detail-post-stats">
                    <div class="detail-stat-row primary">❤️ ${formatNumber(post.likes)}</div>
                    ${post.views ? `<div class="detail-stat-row">👁️ ${formatNumber(post.views)}</div>` : ''}
                    ${post.comments ? `<div class="detail-stat-row">💬 ${formatNumber(post.comments)}</div>` : ''}
                    <a class="detail-post-link" href="${escapeHtml(post.url)}" target="_blank">فتح ↗</a>
                </div>
            </div>
        `;
    }).join('');
}

function closeDetailsModal() {
    document.getElementById('detailsModal').classList.remove('active');
    currentDetailsId = null;
    currentDetailsType = null;
}

// إغلاق الـ modal عند الضغط خارجه
document.getElementById('detailsModal').addEventListener('click', (e) => {
    if (e.target.id === 'detailsModal') closeDetailsModal();
});

// ESC يغلق الـ modal
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetailsModal();
});

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

function showToast(message, type = 'success', duration = 3000) {
    const toast = document.getElementById('toastEl');
    const icon = document.getElementById('toastIcon');
    const text = document.getElementById('toastText');
    
    const icons = {
        success: '✓',
        error: '✕',
        warning: '⚠️',
        info: 'ℹ️',
        loading: '⏳'
    };
    
    icon.textContent = icons[type] || icons.success;
    text.textContent = message;
    
    toast.className = 'toast show';
    if (type !== 'success') toast.classList.add(type);
    
    clearTimeout(window._toastTimer);
    if (duration > 0) {
        window._toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }
}

let isRefreshing = false;

async function refreshLikesNow() {
    if (isRefreshing) return;
    isRefreshing = true;
    
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    btn.disabled = true;
    
    showToast('جاري تحديث اللايكات...', 'loading', 0);
    
    try {
        const startTime = Date.now();
        
        const response = await fetch('/api/refresh-all', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        
        if (!response.ok) {
            throw new Error('فشل الاتصال بالسيرفر');
        }
        
        const data = await response.json();
        const duration = Math.round((Date.now() - startTime) / 1000);
        
        if (data.error) {
            showToast('❌ خطأ: ' + data.error, 'error');
        } else {
            const updated = data.updated || 0;
            const failed = data.failed || 0;
            const total = data.total || 0;
            
            if (updated > 0) {
                showToast(`✅ تم تحديث ${updated} من ${total} منشور (${duration}ث)`, 'success', 4000);
            } else if (failed > 0) {
                showToast(`⚠️ فشل تحديث ${failed} منشور`, 'warning', 4000);
            } else {
                showToast('ℹ️ لا توجد منشورات للتحديث', 'info', 3000);
            }
            
            // أعد تحميل البيانات بعد التحديث
            await loadData();
        }
    } catch (e) {
        console.error('Refresh error:', e);
        showToast('❌ ' + e.message, 'error', 4000);
    } finally {
        btn.classList.remove('spinning');
        btn.disabled = false;
        isRefreshing = false;
    }
}

// ============== Auto Refresh ==============
function updateLastUpdateLabel() {
    const lbl = document.getElementById('lastUpdateLabel');
    if (!lbl) return;
    if (!state || !state.lastUpdate) {
        lbl.textContent = 'لم يتم التحديث بعد';
        return;
    }
    const updateDate = new Date(state.lastUpdate);
    const now = new Date();
    const diffMs = now - updateDate;
    const diffMin = Math.floor(diffMs / 60000);
    const diffSec = Math.floor(diffMs / 1000);
    const diffHour = Math.floor(diffMin / 60);
    
    let text = '';
    if (diffSec < 60) text = `قبل ${diffSec} ثانية`;
    else if (diffMin < 60) text = `قبل ${diffMin} دقيقة`;
    else if (diffHour < 24) text = `قبل ${diffHour} ساعة`;
    else text = updateDate.toLocaleString('ar-SA', { hour: '2-digit', minute: '2-digit' });
    
    lbl.textContent = `🔄 آخر تحديث: ${text}`;
}

async function loadData() {
    try {
        const response = await fetch('/api/state', { cache: 'no-cache' });
        state = await response.json();
        renderAll();
        updateLastUpdateLabel();
    } catch (e) {
        console.error('Load error:', e);
    }
}

// تحديث وقت "قبل X دقيقة" كل 10 ثوان
setInterval(updateLastUpdateLabel, 10000);

// التحديث الأولي
loadData();

// تحديث كل 5 ثوان (LIVE)
setInterval(loadData, 5000);

</script>
